<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Connexion - Sofabi IA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <style>
    :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --secondary-color: #f8fafc;
            --accent-color: #f59e0b;
            --text-dark: #1e293b;
            --text-light: #64748b;
        }
        
        body {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 2rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-container {
            max-width: 420px;
            margin: 0 auto;
            width: 100%;
        }
        
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 
                        0 8px 10px -6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-5px);
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo h2 {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .logo p {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .form-label {
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        
        .input-group-text {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
        }
        
        .btn-login {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 
                        0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }
        
        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(30deg);
            transition: all 0.3s ease;
        }
        
        .btn-login:hover::after {
            left: 100%;
        }
        
        .divider {
            display: flex;
            align-items: center;
            margin: 1.5rem 0;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .divider::before {
            margin-right: 1rem;
        }
        
        .divider::after {
            margin-left: 1rem;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        
        .footer-links a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        
        .footer-links a:hover {
            color: var(--primary-color);
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .password-toggle {
            cursor: pointer;
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }
        
        .password-container {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="login-container animate__animated animate__fadeIn">
        <div class="login-card">
            <div class="logo animate__animated animate__fadeInDown">
                <div class="animate-float">
                    <i class="fas fa-robot" style="font-size: 3rem; color: var(--primary-color);"></i>
                </div>
                <h2 class="mt-3">Sofabi IA</h2>
                <p>Connectez-vous pour accéder à votre espace</p>
            </div>

            <form id="loginForm" method="post" action="/login">
                <div class="mb-3 animate__animated animate__fadeIn animate__delay-1s">
                    <label for="email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" placeholder="votre@email.com" required/>
                    </div>
                </div>

                <div class="mb-3 animate__animated animate__fadeIn animate__delay-1s">
                    <label for="password" class="form-label">Mot de passe</label>
                    <div class="password-container">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required/>
                        </div>
                        <i class="fas fa-eye password-toggle" id="togglePassword"></i>
                    </div>
                    <div class="text-end mt-2">
                        <a href="/forgot-password" style="font-size: 0.8rem; color: var(--text-light);">Mot de passe oublié ?</a>
                    </div>
                </div>

                <div class="d-grid gap-2 animate__animated animate__fadeIn animate__delay-2s">
                    <button type="submit" class="btn btn-login">
                        <span class="me-2">Se connecter</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>

                <div id="errorMessage" class="alert alert-danger mt-3 animate__animated animate__fadeIn" style="display: none;"></div>
            </form>

            <div class="divider animate__animated animate__fadeIn animate__delay-2s">OU</div>
            <div class="text-center animate__animated animate__fadeIn animate__delay-3s">
                <p>Pas encore de compte ? <a href="/register" style="color: var(--primary-color); font-weight: 500;">S'inscrire</a></p>
            </div>
        </div>

        <div class="footer-links animate__animated animate__fadeIn animate__delay-3s">
            <a href="/terms" class="me-3">Conditions d'utilisation</a>
            <a href="/privacy">Politique de confidentialité</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Toggle password
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            // Submit form with redirection logic
            document.getElementById('loginForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                const formData = new FormData(this);
                const errorDiv = document.getElementById('errorMessage');
                const submitButton = this.querySelector('button[type="submit"]');

                submitButton.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Connexion...';
                submitButton.disabled = true;

                try {
                    const response = await fetch('/login', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        const data = await response.json();
                        // Redirection based on role
                        if (data.is_admin) {
                            window.location.href = '/admin';
                        } else {
                            window.location.href = '/chat';
                        }
                    } else {
                        errorDiv.textContent = 'Erreur de connexion';
                        errorDiv.style.display = 'block';
                    }
                } catch (error) {
                    console.error('Erreur:', error);
                    errorDiv.textContent = 'Erreur de connexion au serveur';
                    errorDiv.style.display = 'block';
                } finally {
                    submitButton.innerHTML = '<span class="me-2">Se connecter</span><i class="fas fa-arrow-right"></i>';
                    submitButton.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
